# These environment variables must be set in CircleCI UI
#
# NPM_TOKEN - A valid NPM token for releases
version: 2.1

orbs:
  codecov: codecov/codecov@3.2.4

references:
  defaults: &defaults
    working_directory: ~/addons-scanner-utils
    docker:
      # This is the NodeJS version we run in production.
      - image: cimg/node:22.22

  defaults-next: &defaults-next
    working_directory: ~/addons-scanner-utils
    docker:
      # This is the next NodeJS version we will support.
      - image: cimg/node:24.14

  restore_build_cache: &restore_build_cache
    restore_cache:
      name: restore npm package cache
      keys:
        - npm-packages-{{ checksum "package-lock.json" }}

  run_npm_install: &run_npm_install
    run:
      name: install dependencies
      command: npm ci

  save_build_cache: &save_build_cache
    save_cache:
      name: save npm package cache
      key: npm-packages-{{ checksum "package-lock.json" }}
      paths:
        - ./node_modules

  restore_next_build_cache: &restore_next_build_cache
    restore_cache:
      name: restore npm package cache
      keys:
        - next-npm-packages-{{ checksum "package-lock.json" }}

  save_next_build_cache: &save_next_build_cache
    save_cache:
      name: save npm package cache
      key: next-npm-packages-{{ checksum "package-lock.json" }}
      paths:
        - ./node_modules

jobs:
  test:
    <<: *defaults
    steps:
      - checkout
      - *restore_build_cache
      - *run_npm_install
      - *save_build_cache
      - run:
          name: unit tests
          command: npm run test-ci
      - codecov/upload
      # Make sure we can build a production package.
      - run:
          name: npm pack
          command: |
            npm pack
            # The `prepack` script is supposed to remove spec files.
            test ! -f dist/functions.spec.ts
      - run: npm run typecheck
      - run: npm run type-coverage
      - run: npm run prettier-ci
      - run: npm run lint
      # Set up a workspace to share data between this job and the `release-tag`
      # one when we want to publish a new npm version.
      - persist_to_workspace:
          root: ~/addons-scanner-utils
          paths: .
      - store_artifacts:
          path: coverage

  test-next:
    <<: *defaults-next
    steps:
      - checkout
      - *restore_next_build_cache
      - *run_npm_install
      - *save_next_build_cache
      - run: npm run test-ci

  release-tag:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/addons-scanner-utils
      - run:
          name: authenticate with registry
          # We don't want to expand the token in this file, npm will do it.
          command: echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > ~/addons-scanner-utils/.npmrc
      - run:
          name: publish package
          command: npm publish

workflows:
  version: 2
  default-workflow:
    jobs:
      - test:
          filters: # required since `release-tag` has tag filters AND requires `test`
            tags:
              only: /.*/
      - test-next
      - release-tag:
          requires:
            - test
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
